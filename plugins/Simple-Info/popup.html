<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Info</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
            width: 300px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h3 { margin: 0 0 10px 0; text-align: center; color: #1DB954; }
        .info { margin-bottom: 5px; font-size: 14px; }
        .label { color: #888; }
        #close-btn {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h3>🎵 Инфо о треке</h3>
    <div class="info"><span class="label">Название:</span> <span id="track-title">—</span></div>
    <div class="info"><span class="label">Исполнитель:</span> <span id="track-artist">—</span></div>
    <div class="info"><span class="label">Статус:</span> <span id="play-status">—</span></div>
    <div class="info"><span class="label">Громкость:</span> <span id="volume-display">—</span></div>
    <button id="close-btn">Закрыть окно</button>

    <script src="renderer.js"></script>
</body>
</html>
